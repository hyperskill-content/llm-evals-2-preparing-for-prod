model_list:
  - model_name: gpt-4o-mini
    litellm_params:
      model: gpt-4o-mini
      api_base: https://litellm.aks-hs-prod.int.hyperskill.org/openai
      api_key: os.environ/OPENAI_API_KEY
      rpm: 10
      tpm: 500
      num_retries: 3

  - model_name: text-embedding-ada-002
    litellm_params:
      model: text-embedding-ada-002
      api_key: os.environ/OPENAI_API_KEY
      num_retries: 5
      mode: embedding

litellm_settings:
  drop_params: True
  success_callback: ["langfuse"]
  max_budget: 5
  max_end_user_budget: 0.002
  budget_duration: 1d
  request_timeout: 600
  set_verbose: False
  json_logs: true

general_settings:
  master_key: sk-deploying-llm-applications
  salt_key: deploying-llm-apps
  database_url: "postgresql://llmproxy:dbpassword9090@db:5432/litellm"
